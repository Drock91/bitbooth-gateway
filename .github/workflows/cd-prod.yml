name: cd-prod

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (commit SHA or tag)
        required: true
        type: string
      skip_diff:
        description: Skip CDK diff step
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  diff:
    if: ${{ !inputs.skip_diff }}
    runs-on: ubuntu-latest
    environment: production-diff
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK diff (prod)
        run: npm run cdk:diff
        env:
          STAGE: prod
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

  approve:
    needs: diff
    if: ${{ always() && (needs.diff.result == 'success' || needs.diff.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval gate passed
        run: echo "Production deployment approved"

  deploy:
    needs: approve
    runs-on: ubuntu-latest
    concurrency:
      group: cd-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK deploy prod
        run: npm run cdk:deploy:prod
        env:
          STAGE: prod
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

  smoke:
    needs: deploy
    uses: ./.github/workflows/smoke-test.yml
    with:
      base_url: ${{ vars.PROD_BASE_URL }}
      strict: true
